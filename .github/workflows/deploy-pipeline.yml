name: IMS CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE_NAME: ims-backend
  FRONTEND_IMAGE_NAME: ims-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE_NAME }}:latest

      - name: Save Docker images as tar archive
        run: |
          docker save \
            ${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.BACKEND_IMAGE_NAME }}:latest \
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${{ env.FRONTEND_IMAGE_NAME }}:latest \
            -o ims-images.tar

      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: ims-images.tar
          retention-days: 1

  scan:
    name: scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Docker images
        run: docker load -i ims-images.tar

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan backend image
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format table \
            --exit-code 0 \
            ${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Scan frontend image
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --format table \
            --exit-code 0 \
            ${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  push:
    name: push
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load Docker images
        run: docker load -i ims-images.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push backend image
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

          docker tag ${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${ECR_REGISTRY}/${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          docker tag ${{ env.BACKEND_IMAGE_NAME }}:latest \
            ${ECR_REGISTRY}/${{ env.BACKEND_IMAGE_NAME }}:latest

          docker push ${ECR_REGISTRY}/${{ env.BACKEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${ECR_REGISTRY}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Tag and push frontend image
        run: |
          ECR_REGISTRY=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

          docker tag ${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            ${ECR_REGISTRY}/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

          docker tag ${{ env.FRONTEND_IMAGE_NAME }}:latest \
            ${ECR_REGISTRY}/${{ env.FRONTEND_IMAGE_NAME }}:latest

          docker push ${ECR_REGISTRY}/${{ env.FRONTEND_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${ECR_REGISTRY}/${{ env.FRONTEND_IMAGE_NAME }}:latest

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: push

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: BACKEND_IMAGE_NAME,FRONTEND_IMAGE_NAME,IMAGE_TAG
          script: |
            set -e

            AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com

            # Authenticate with ECR
            aws ecr get-login-password --region ${AWS_REGION} | \
              docker login --username AWS --password-stdin ${ECR_REGISTRY}

            # Pull latest images
            docker pull ${ECR_REGISTRY}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}
            docker pull ${ECR_REGISTRY}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}

            # Stop existing containers
            cd /home/ubuntu/ims
            docker compose -f docker-compose.deploy.yml down || true

            # Set environment variables for compose
            export BACKEND_IMAGE=${ECR_REGISTRY}/${BACKEND_IMAGE_NAME}:${IMAGE_TAG}
            export FRONTEND_IMAGE=${ECR_REGISTRY}/${FRONTEND_IMAGE_NAME}:${IMAGE_TAG}

            # Start the stack
            docker compose -f docker-compose.deploy.yml up -d

            # Verify deployment
            sleep 10
            docker ps

